# SLURM JOB PARAMETERS
cpus_per_task: 8
mem_per_gpu: 64G
nodes: 1
tasks_per_node: 2 # Number of GPUs to use

# EVALUATION PARAMETERS
eval_name: video_classification_frozen
folder: /scratch/cbjp404/AI-Endo/vjepa2_evals/vitl/surgical_fpc64_256
resume_checkpoint: true
tag: surgical-vitl-64f-256
num_workers: 8

experiment:
  classifier:
    num_heads: 16
    num_probe_blocks: 4
  data:
    dataset_type: surgical # Use our custom surgical dataset loader
    # Path to the data dictionary YAML file.
    # The loader will use this path for both training and validation splits defined within the YAML.
    dataset_path: /scratch/cbjp404/AI-Endo/data_dict.yaml
    frame_step: 1 # Process every frame in the sequence
    frames_per_clip: 64 # Sequence length (matches vjepa2-vitl-fpc64-256)
    num_classes: 4 # Marking, Injection, Dissection, Idle
    num_segments: 1 # We process one sequence at a time
    num_views_per_segment: 1
    resolution: 256 # Matches vjepa2-vitl-fpc64-256 input resolution
  optimization:
    batch_size: 16
    # Simplified hyperparameter set for initial evaluation
    multihead_kwargs:
    - final_lr: 0.0
      final_weight_decay: 0.01
      lr: 0.001
      start_lr: 0.001
      warmup: 0.0
      weight_decay: 0.01
    num_epochs: 30
    use_bfloat16: true
    use_pos_embed: false

model_kwargs:
  # Using Hugging Face's vjepa2-vitl-fpc64-256 model
  checkpoint: facebook/vjepa2-vitl-fpc64-256
  module_name: evals.video_classification_frozen.modelcustom.vit_encoder_multiclip
  pretrain_kwargs:
    encoder:
      checkpoint_key: ""  # Empty string for Hugging Face models
      img_temporal_dim_size: 64  # Matches fpc64 in model name
      model_name: vit_large
      patch_size: 16
      tubelet_size: 2
      uniform_power: true
      use_rope: true
  wrapper_kwargs:
    max_frames: 64  # Matches fpc64 in model name
    use_pos_embed: false
